<article>
  <header><h1>{{ include.title | default: page.title }}</h1></header>
  <ul class="archive">

    <pre>
    {{ site.gallery_posts | inspect }}
    </pre>
    
    {% for post in site.gallery_posts %}
    <li>
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      {% if post.image %}
      <img src="{{ post.image | relative_url }}" alt="{{ post.title }}" style="max-width: 200px; display: block;">
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</article>
